<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>白名單管理 — PII Scanner</title>
<style>
  :root {
    color-scheme: light dark;
    --bg-grad-1: #eef2ff;
    --bg-grad-2: #f6f8fc;
    --surface: #ffffff;
    --surface-2: #f7f9ff;
    --surface-inset: #f1f4fb;
    --border: #e2e6f0;
    --border-strong: #c8cce0;
    --text: #1a1f33;
    --text-soft: #4a5074;
    --text-mute: #6a7194;
    --brand: #4f46e5;
    --brand-2: #6366f1;
    --brand-soft: #eef2ff;
    --brand-ring: rgba(79, 70, 229, .25);
    --ok: #16a34a; --ok-bg: #dcfce7;
    --err: #b91c1c; --err-bg: #fee2e2;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
    --shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 10px 30px -12px rgba(15, 23, 42, .10);
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-grad-1: #11173a;
      --bg-grad-2: #0b1020;
      --surface: #151b34;
      --surface-2: #1b223e;
      --surface-inset: #11172e;
      --border: #2b3357;
      --border-strong: #3a4374;
      --text: #e6e8f5;
      --text-soft: #b0b6d4;
      --text-mute: #8a90b3;
      --brand: #818cf8;
      --brand-2: #a5b4fc;
      --brand-soft: #1f244a;
      --brand-ring: rgba(129, 140, 248, .35);
      --ok-bg: #0d2818; --err-bg: #3a1818;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto,
                 "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    margin: 0; color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--brand-soft) 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--brand); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    backdrop-filter: saturate(180%) blur(10px);
    background: color-mix(in oklab, var(--surface) 75%, transparent);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 30;
  }
  .topbar-inner {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 24px; max-width: 1180px; margin: 0 auto;
  }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--brand) 0%, #22d3ee 100%);
    display: grid; place-items: center; color: white;
    box-shadow: 0 6px 20px -6px var(--brand-ring);
  }
  .brand-text { line-height: 1.1; }
  .brand-text strong { font-size: 15px; font-weight: 700; }
  .brand-text small { color: var(--text-mute); font-size: 12px; }
  .topbar nav { margin-left: auto; display: flex; gap: 12px; align-items: center; font-size: 13px; }

  main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 56px; }
  h1 {
    margin: 0 0 4px; font-size: 28px; letter-spacing: -.4px;
    background: linear-gradient(180deg, var(--text) 0%, color-mix(in oklab, var(--text) 70%, var(--brand)) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h1 + p { margin: 0 0 24px; color: var(--text-soft); font-size: 14.5px; }

  section.card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 24px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  section.card h2 {
    margin: 0 0 4px; font-size: 16.5px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  p.hint { margin: 0 0 14px; color: var(--text-soft); font-size: 13px; line-height: 1.65; }
  p.hint code { background: var(--surface-inset); padding: 1px 6px; border-radius: 5px; font-size: 12.5px; }

  label { font-size: 13px; font-weight: 600; display: block; margin: 12px 0 6px; color: var(--text-soft); }
  textarea, input[type=text] {
    width: 100%; padding: 11px 13px;
    border: 1px solid var(--border-strong); background: var(--surface-2);
    color: var(--text);
    border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  textarea { min-height: 100px; resize: vertical; line-height: 1.55; }
  textarea:focus, input:focus {
    outline: none; border-color: var(--brand);
    box-shadow: 0 0 0 4px var(--brand-ring); background: var(--surface);
  }

  .det-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .det-grid label {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 500; font-size: 13px; margin: 0;
    padding: 8px 12px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-soft);
    transition: background-color .12s, border-color .12s, color .12s;
  }
  .det-grid label:hover { background: var(--brand-soft); border-color: color-mix(in oklab, var(--brand) 30%, var(--border)); color: var(--text); }
  .det-grid label:has(input:checked) { background: color-mix(in oklab, var(--brand-soft) 70%, var(--surface)); border-color: var(--brand); color: var(--text); }
  .det-grid input[type=checkbox] {
    appearance: none; width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border-strong); background: var(--surface);
    position: relative; cursor: pointer;
  }
  .det-grid input[type=checkbox]:checked { background: var(--brand); border-color: var(--brand); }
  .det-grid input[type=checkbox]:checked::after {
    content: ""; position: absolute; left: 4px; top: 1px;
    width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .domain-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 16px; margin-top: 14px;
    background: var(--surface-2);
  }
  .domain-card h3 {
    margin: 0 0 8px; font-size: 13px; color: var(--text-mute);
    font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  }

  button {
    appearance: none; border: none; cursor: pointer;
    padding: 10px 18px; border-radius: 10px;
    font-weight: 600; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform .12s, box-shadow .15s, background-color .15s;
  }
  button.primary {
    background: linear-gradient(180deg, var(--brand) 0%, var(--brand-2) 100%);
    color: white; box-shadow: 0 6px 16px -6px var(--brand-ring);
  }
  button.primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 22px -8px var(--brand-ring); }
  button.primary:disabled { opacity: .65; cursor: not-allowed; }
  button.secondary {
    background: var(--surface-inset); color: var(--text); border: 1px solid var(--border);
  }
  button.secondary:hover { background: var(--surface-2); }
  button.danger {
    background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca;
  }
  button.danger:hover { background: #fecaca; }
  @media (prefers-color-scheme: dark) {
    button.danger { background: #3a1818; color: #fca5a5; border-color: #5a2424; }
    button.danger:hover { background: #4a1f1f; }
  }
  .toolbar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .save-bar {
    position: sticky; bottom: 16px; z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 20px; box-shadow: var(--shadow);
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-top: 18px;
  }
  .save-bar .msg-inline { color: var(--text-soft); font-size: 13px; }

  .msg {
    padding: 11px 16px; border-radius: var(--radius-sm); margin-bottom: 14px; font-size: 14px;
    display: none; align-items: center; gap: 8px;
  }
  .msg.ok { display: flex; background: var(--ok-bg); color: #166534; border: 1px solid #86efac; }
  .msg.err { display: flex; background: var(--err-bg); color: #991b1b; border: 1px solid #fca5a5; }
  @media (prefers-color-scheme: dark) {
    .msg.ok { color: #86efac; border-color: #14532d; }
    .msg.err { color: #fca5a5; border-color: #7f1d1d; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-mark" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    </div>
    <div class="brand-text">
      <strong>PII Scanner</strong><br>
      <small>白名單管理</small>
    </div>
    <nav>
      <a href="/">← 返回掃描首頁</a>
    </nav>
  </div>
</div>

<main>
  <h1>白名單管理</h1>
  <p>調整偵測器啟用狀態、忽略詞與依網域規則。儲存後立即生效。</p>

  <div id="msg" class="msg"></div>

  <section class="card">
    <h2>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      全域設定
    </h2>
    <p class="hint">勾選＝<strong>停用</strong>該偵測器（不會出現在掃描結果）。若要啟用「百家姓全文」，請<strong>取消勾選</strong> <code>surname_name</code>。網站掃描仍會略過頁尾依法公開之承辦人姓名。</p>
    <label>停用的偵測器</label>
    <div id="global-detectors" class="det-grid"></div>
    <label>全域忽略詞（每行一個，命中值或上下文包含即略過）</label>
    <textarea id="ignore-words" placeholder="淡江大學&#10;public@example.com"></textarea>
  </section>

  <section class="card">
    <h2>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      依網域規則
    </h2>
    <p class="hint">針對特定網站放寬規則。例如校系官網可停用地址/姓名偵測，或忽略公開聯絡 Email。</p>
    <div id="domain-rules"></div>
    <div class="toolbar">
      <button type="button" class="secondary" id="btn-add-domain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增網域規則
      </button>
    </div>
  </section>

  <div class="save-bar">
    <button type="button" class="primary" id="btn-save">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      儲存白名單
    </button>
    <button type="button" class="secondary" id="btn-reload">重新載入</button>
    <span class="msg-inline">儲存後即時套用，會影響所有後續掃描結果。</span>
  </div>
</main>

<script>
const DETECTOR_LABELS = {
  surname_name: '百家姓全文 (surname_name)',
  chinese_name: '關鍵字姓名 (chinese_name)',
  taiwan_address: '台灣地址',
  taiwan_id: '身分證',
  taiwan_mobile: '手機',
  email: 'Email',
  ipv4: 'IPv4',
  taiwan_landline: '市話',
  credit_card: '信用卡',
  taiwan_business_id: '統編',
  taiwan_passport: '護照',
  taiwan_nhi_card: '健保卡',
  bank_account: '銀行帳號',
  date_of_birth: '生日',
  taiwan_license_plate: '車牌',
  ipv6: 'IPv6',
  taiwan_resident_cert: '居留證',
};
const DEFAULT_DETECTORS = Object.keys(DETECTOR_LABELS);

function emptyConfig() {
  return {
    version: 1,
    global_disabled_detectors: ['surname_name'],
    ignore_words: [],
    domain_rules: [],
  };
}

let detectors = [...DEFAULT_DETECTORS];
let config = emptyConfig();

function showMsg(text, ok=true) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderGlobalDetectors() {
  const box = document.getElementById('global-detectors');
  const disabled = new Set((config && config.global_disabled_detectors) || []);
  box.innerHTML = detectors.map(name => {
    const label = DETECTOR_LABELS[name] || name;
    const checked = disabled.has(name) ? 'checked' : '';
    return `<label title="勾選＝停用此偵測器"><input type="checkbox" data-global-det="${name}" ${checked}> 停用 ${label}</label>`;
  }).join('');
}

function renderDomainRules() {
  const box = document.getElementById('domain-rules');
  box.innerHTML = '';
  const rules = (config && config.domain_rules) || [];
  rules.forEach((rule, idx) => {
    const div = document.createElement('div');
    div.className = 'domain-card';
    const detChecks = detectors.map(name => {
      const on = (rule.disabled_detectors || []).includes(name);
      const label = DETECTOR_LABELS[name] || name;
      return `<label><input type="checkbox" data-idx="${idx}" data-det="${name}" ${on?'checked':''}> ${label}</label>`;
    }).join('');
    div.innerHTML = `
      <h3>網域 #${idx + 1}</h3>
      <label>網域（例：tku.edu.tw）</label>
      <input type="text" data-field="domain" data-idx="${idx}" value="${escapeHtml(rule.domain||'')}">
      <label>此網域停用的偵測器</label>
      <div class="det-grid">${detChecks}</div>
      <label>此網域忽略詞（每行一個）</label>
      <textarea data-field="ignore_words" data-idx="${idx}">${escapeHtml((rule.ignore_words||[]).join('\n'))}</textarea>
      <div class="toolbar"><button type="button" class="danger" data-remove="${idx}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        刪除此規則
      </button></div>
    `;
    box.appendChild(div);
  });
}

function escapeHtml(s) {
  return (s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}

function collectConfig() {
  const rules = (config && config.domain_rules) || [];
  const globalDisabled = [...document.querySelectorAll('[data-global-det]')]
    .filter(el => el.checked).map(el => el.dataset.globalDet);
  const ignoreWords = document.getElementById('ignore-words').value
    .split('\n').map(s => s.trim()).filter(Boolean);
  const domainRules = rules.map((rule, idx) => {
    const domainEl = document.querySelector(`input[data-field="domain"][data-idx="${idx}"]`);
    const wordsEl = document.querySelector(`textarea[data-field="ignore_words"][data-idx="${idx}"]`);
    const disabled = [...document.querySelectorAll(`input[data-idx="${idx}"][data-det]`)]
      .filter(el => el.checked).map(el => el.dataset.det);
    return {
      domain: (domainEl && domainEl.value || '').trim(),
      disabled_detectors: disabled,
      ignore_words: (wordsEl && wordsEl.value || '').split('\n').map(s => s.trim()).filter(Boolean),
    };
  }).filter(r => r.domain);
  return {
    version: 1,
    global_disabled_detectors: globalDisabled,
    ignore_words: ignoreWords,
    domain_rules: domainRules,
  };
}

async function fetchJson(url, options = {}, timeoutMs = 15000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: ctrl.signal, credentials: 'same-origin' });
  } catch (e) {
    if (e.name === 'AbortError') {
      throw new Error('請求逾時（15秒）。若正在整站掃描，請等待掃描完成後再試。');
    }
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function loadConfig() {
  showMsg('載入中…', true);
  try {
    const resp = await fetchJson('/admin/api/config');
    if (!resp.ok) {
      let detail = '';
      try { detail = (await resp.json()).detail || ''; } catch (_) {}
      showMsg('載入失敗：' + resp.status + (detail ? ' — ' + detail : '') + '（仍可編輯後按儲存）', false);
      renderGlobalDetectors();
      renderDomainRules();
      return;
    }
    const data = await resp.json();
    detectors = data.detectors && data.detectors.length ? data.detectors : DEFAULT_DETECTORS;
    config = data.config || emptyConfig();
    document.getElementById('ignore-words').value = (config.ignore_words || []).join('\n');
    renderGlobalDetectors();
    renderDomainRules();
    showMsg('✓ 白名單已載入');
  } catch (e) {
    showMsg('載入錯誤：' + (e.message || e) + '（仍可編輯後按儲存）', false);
    renderGlobalDetectors();
    renderDomainRules();
  }
}

async function saveConfig() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  const oldText = btn.innerHTML;
  btn.innerHTML = '儲存中…';
  showMsg('儲存中…', true);
  try {
    const body = collectConfig();
    const resp = await fetchJson('/admin/api/config', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    let payload = {};
    try { payload = await resp.json(); } catch (_) {}
    if (!resp.ok) {
      const detail = payload.detail || payload.message || ('HTTP ' + resp.status);
      showMsg('儲存失敗：' + detail, false);
      return;
    }
    config = body;
    showMsg('✓ 白名單已儲存成功');
  } catch (e) {
    showMsg('儲存錯誤：' + (e.message || e), false);
  } finally {
    btn.disabled = false;
    btn.innerHTML = oldText;
  }
}

document.getElementById('btn-save').addEventListener('click', saveConfig);
document.getElementById('btn-reload').addEventListener('click', loadConfig);

document.getElementById('btn-add-domain').addEventListener('click', () => {
  if (!config) config = emptyConfig();
  config.domain_rules = config.domain_rules || [];
  config.domain_rules.push({domain:'', disabled_detectors:[], ignore_words:[]});
  renderDomainRules();
});

document.getElementById('domain-rules').addEventListener('click', e => {
  const btn = e.target.closest('[data-remove]');
  if (btn && config) {
    config.domain_rules.splice(Number(btn.dataset.remove), 1);
    renderDomainRules();
  }
});

renderGlobalDetectors();
loadConfig();
</script>
</body></html>
